name: publish

on:
  workflow_dispatch:           # déclenché par les pingers via l'API GitHub Actions

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout publisher
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch pinger results (GCS)
        run: |
          mkdir -p results
          gsutil -m rsync -r gs://mcp-benchmark-results results/ || true

      - name: Fetch provider metadata
        run: |
          curl -s "https://raw.githubusercontent.com/mcp-server-hosting-providers-benchmark/mcp_server_per_hosting_provider/main/hosting_providers_metadata.json" > provider_metadata.json

      - name: Run publisher
        run: node publish.js --results ./results --out ./out --base /tools_list_latency_publisher --metadata ./provider_metadata.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
